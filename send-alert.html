<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Send Swarm Alert — Admin</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="icon" href="SESJ.svg" type="image/svg+xml" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Swarm Alert" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, system-ui, sans-serif;
    background: #0c0e0c;
    color: #e8e2d4;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
    text-align: center;
    gap: 1.5rem;
  }
  h1 { font-size: 1.5rem; font-weight: 700; color: #ffd070; }
  h2 { font-size: 1.1rem; font-weight: 600; color: #84a98a; margin-top: 1.5rem; }
  p { color: #98a298; font-size: 0.95rem; max-width: 42ch; line-height: 1.5; }
  .count { font-size: 2.8rem; font-weight: 800; color: #84a98a; }
  .btn {
    display: inline-block;
    padding: 1.1rem 2.4rem;
    font-size: 1.1rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-alert { background: #c04040; color: #fff; }
  .btn-alert:hover { background: #e04a4a; }
  .btn-alert:active { background: #a03030; }
  .btn-view { background: #2a5040; color: #cde6d4; }
  .btn-view:hover { background: #366050; }
  .btn-cancel { background: #333; color: #aaa; font-size: 0.9rem; padding: 0.8rem 1.8rem; }
  .btn-row { display: flex; gap: 0.8rem; flex-wrap: wrap; justify-content: center; }
  .confirm { display: none; flex-direction: column; align-items: center; gap: 1rem; }
  .confirm.show { display: flex; }
  .hidden { display: none; }
  .status { color: #a98b5e; font-size: 0.88rem; min-height: 1.5em; }
  .preview {
    margin-top: 1rem; padding: 1rem;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px; text-align: left;
    font-size: 0.82rem; color: #c7c0ad;
    max-width: 44ch; line-height: 1.55; white-space: pre-wrap;
  }
  /* Subscriber table */
  .table-wrap {
    width: 100%; max-width: 700px; overflow-x: auto;
    margin-top: 1rem; text-align: left;
  }
  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  th { background: #1a2a1f; color: #84a98a; padding: 0.55rem 0.7rem; text-align: left; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; font-size: 0.7rem; }
  td { padding: 0.5rem 0.7rem; border-top: 1px solid rgba(255,255,255,0.06); color: #c7c0ad; }
  tr:hover td { background: rgba(255,255,255,0.03); }
  .chip { display: inline-block; padding: 0.15rem 0.45rem; border-radius: 3px; font-size: 0.7rem; background: rgba(132,169,138,0.15); color: #84a98a; margin: 0.1rem; }
</style>
</head>
<body>
  <h1>🐜 Formosan Swarm Alert — Admin</h1>
  <p>Load your subscriber list, view signups, or send the alert from your Gmail.</p>

  <div id="step1">
    <p class="status" id="status">Tap to load subscriber data from your sheet.</p>
    <br/>
    <button class="btn btn-view" onclick="fetchData()">Load Subscribers</button>
  </div>

  <div class="confirm" id="step2">
    <p><span class="count" id="count">0</span> subscribers</p>
    <div class="btn-row">
      <button class="btn btn-alert" onclick="sendAlert()">Send Swarm Alert</button>
      <button class="btn btn-view" onclick="toggleTable()">View List</button>
      <button class="btn btn-cancel" onclick="cancel()">Reset</button>
    </div>
  </div>

  <div class="hidden" id="confirmSend">
    <p style="color:#e8e2d4;font-weight:600;">This will open Gmail with all subscribers BCC'd and the alert pre-written.</p>
    <div class="btn-row">
      <button class="btn btn-alert" onclick="doSend()">Confirm — Open Gmail</button>
      <button class="btn btn-cancel" onclick="cancelSend()">Go Back</button>
    </div>
    <div class="preview" id="preview"></div>
  </div>

  <div class="hidden" id="tableBox">
    <h2>Subscriber List</h2>
    <div class="table-wrap" id="tableWrap"></div>
  </div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwV5xYmsnPSgvw_wo3htm_oPvcCQiShw9tEWr80S8VZOuy6RBoD8fwZrXtycN6maACHfw/exec';
const SECRET = 'DRewgreer24@$$';

let emailList = [];
let allRows = [];

const SUBJECT = 'Formosan Termite Swarm Alert \u2014 Kill Your Porch Lights Tonight';
const BODY = `Swarm conditions are active in Southeast Texas tonight.

Warm, humid air and dropping pressure mean Formosan subterranean termites are likely swarming at dusk. They\u2019re drawn to any exterior light \u2014 porch lights, garage lights, landscape fixtures, even interior lights visible through windows.

What to do right now:
\u2022 Turn off all exterior lights by sundown.
\u2022 Close blinds and curtains near lit rooms.
\u2022 If you have yellow/amber "bug bulbs," switch to those for any lights you can\u2019t turn off.
\u2022 Check around doors and window frames tomorrow morning for dropped wings \u2014 that\u2019s the sign they landed and are looking to start a colony.

Why it matters:
A swarm at your light means a colony is already established within ~300 feet of your home. These termites attack both structures and living trees from the inside out \u2014 you often can\u2019t see the damage until it\u2019s too late.

If you find dropped wings or suspect activity in your trees, reach out and we\u2019ll take a look.

\u2014 Dex, South East Stump Jumpers`;

async function fetchData() {
  const status = document.getElementById('status');
  status.textContent = 'Loading...';
  try {
    const url = SCRIPT_URL + '?secret=' + encodeURIComponent(SECRET) + '&full=1';
    const res = await fetch(url);
    const data = await res.json();
    if (data.error) { status.textContent = 'Error: ' + data.error; return; }
    emailList = data.emails || [];
    allRows = data.rows || [];
    if (emailList.length === 0) { status.textContent = 'No subscribers yet.'; return; }
    document.getElementById('count').textContent = emailList.length;
    document.getElementById('step1').classList.add('hidden');
    document.getElementById('step2').classList.add('show');
    buildTable();
  } catch (err) {
    status.textContent = 'Fetch failed: ' + err.message;
  }
}

function buildTable() {
  let html = '<table><thead><tr><th>Date</th><th>Email</th><th>Name</th><th>Area</th><th>Alerts</th></tr></thead><tbody>';
  for (const r of allRows) {
    const date = r[0] ? new Date(r[0]).toLocaleDateString() : '';
    const email = r[1] || '';
    const name = r[2] || '\u2014';
    const area = r[3] || '\u2014';
    const alerts = (r[4] || '').split(',').map(a => a.trim()).filter(Boolean).map(a => '<span class="chip">' + a + '</span>').join(' ');
    html += '<tr><td>' + date + '</td><td>' + email + '</td><td>' + name + '</td><td>' + area + '</td><td>' + alerts + '</td></tr>';
  }
  html += '</tbody></table>';
  document.getElementById('tableWrap').innerHTML = html;
}

function toggleTable() {
  document.getElementById('tableBox').classList.toggle('hidden');
}

function sendAlert() {
  document.getElementById('step2').classList.remove('show');
  document.getElementById('confirmSend').classList.remove('hidden');
  document.getElementById('preview').textContent = BODY;
}

function doSend() {
  const bcc = emailList.join(',');
  const mailto = 'mailto:?bcc=' + encodeURIComponent(bcc)
    + '&subject=' + encodeURIComponent(SUBJECT)
    + '&body=' + encodeURIComponent(BODY);
  window.location.href = mailto;
}

function cancelSend() {
  document.getElementById('confirmSend').classList.add('hidden');
  document.getElementById('step2').classList.add('show');
}

function cancel() {
  document.getElementById('step1').classList.remove('hidden');
  document.getElementById('step2').classList.remove('show');
  document.getElementById('confirmSend').classList.add('hidden');
  document.getElementById('tableBox').classList.add('hidden');
  document.getElementById('status').textContent = 'Reset. Tap again when ready.';
}
</script>
</body>
</html>
